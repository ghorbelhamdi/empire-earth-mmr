services:
  - type: web
    name: empire-earth-mmr
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        value: empire2026
      - key: REQUIRE_MATCH_APPROVAL
        value: "true"
    plan: free
